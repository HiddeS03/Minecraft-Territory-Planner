services:
  backend:
    build:
      context: /tmp/workspace/HiddeS03/Minecraft-Territory-Planner/backend
    ports:
      - "3001:3001"
    volumes:
      - territory_data:/app/data

  frontend:
    build:
      context: /tmp/workspace/HiddeS03/Minecraft-Territory-Planner/frontend
